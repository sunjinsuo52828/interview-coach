# Pytest配置文件

[pytest]
# 测试发现
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# 测试路径
testpaths = tests

# 输出选项
addopts =
    -v
    --strict-markers
    --tb=short
    --cov=agents
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-fail-under=70

# 标记定义
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (slower, may need external services)
    slow: Slow running tests
    tdd: TDD cycle tests
    parser: Parser agent tests
    interviewer: Interviewer agent tests
    evaluator: Evaluator agent tests

# 超时配置
timeout = 300

# 最小Python版本
minversion = 3.10

# 日志配置
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# 覆盖率配置
[coverage:run]
source = agents
omit =
    */__init__.py
    */conftest.py
    tests/*

[coverage:report]
precision = 2
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
